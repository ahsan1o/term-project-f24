name: wf-develop-pr
on:
pull_request:
branches:
- develop

jobs:
develop-pr-job:
runs-on: ubuntu-latest

steps:
  - name: repo checkout
    uses: actions/checkout@v4
  
  - name: running html hint  
    run: npx htmlhint "**/*.html"

  - name: running style lint
    run: npx stylelint "**/*.css"

  - name: building website dist is important
    run: |
      npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"
